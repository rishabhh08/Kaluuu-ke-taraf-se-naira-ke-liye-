<script>
    function showPage(id) { document.querySelectorAll('.box').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function moveNaira() { const b = document.getElementById('nairaBtn'); b.style.position = 'fixed'; b.style.top = Math.random()*70 + 'vh'; b.style.left = Math.random()*70 + 'vw'; }
    function showContent(txt) { showPage('pDisplay'); document.getElementById('contentBox').innerHTML = `<b>${txt}</b>`; }
    function showMedia(type, src, cap) { showPage('pDisplay'); document.getElementById('contentBox').innerHTML = (type=='vid' ? `<video src="${src}" controls autoplay></video>` : `<img src="${src}">`) + `<p>${cap}</p>`; }
    setInterval(() => { let h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart'; h.style.left = Math.random()*100 + 'vw'; document.body.appendChild(h); setTimeout(() => h.remove(), 5000); }, 500);
